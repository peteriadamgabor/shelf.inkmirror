name: Deploy

# Auto-deploy the Shelf Worker on every push to master. Applies any pending
# D1 migrations first (idempotent — only unapplied ones run), then deploys.
# No manual `wrangler deploy` needed.
#
# One-time setup by the repo owner:
#   1. Cloudflare dashboard → My Profile → API Tokens → Create Token →
#      "Edit Cloudflare Workers" template (grants Workers Scripts:Edit +
#      Account:Read). Add D1:Edit for the migration step. Scope it to the
#      Peteriadamgabor account.
#   2. GitHub repo → Settings → Secrets and variables → Actions → New
#      repository secret: name CLOUDFLARE_API_TOKEN, value the token above.
# The account id is already pinned in wrangler.jsonc, so no second secret.

on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-master
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck and test
        run: |
          npm run typecheck
          npm test
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply inkmirror-shelf --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
